<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent: #238636;
            --accent-hover: #2ea043;
            --error: #f85149;
            --border: #30363d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        p.subheading {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            background: var(--container-bg);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 12px 16px;
            font-size: 1rem;
            outline: none;
        }

        button.generate-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button.generate-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        button.generate-btn:active {
            transform: translateY(0);
        }

        #error-msg {
            color: var(--error);
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        /* Loading Skeleton */
        .skeleton {
            display: none;
            width: 350px;
            height: 300px;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .skeleton-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .skeleton-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #21262d;
        }

        .skeleton-line {
            height: 15px;
            background: #21262d;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .skeleton-line.short { width: 60%; }
        .skeleton-line.long { width: 100%; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .pulsing {
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Result Area */
        #result-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #card-render {
            display: flex;
            justify-content: center;
        }

        .share-btn {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s, border-color 0.2s;
        }

        .share-btn:hover {
            color: var(--text-main);
            border-color: var(--text-dim);
        }

        .share-btn.copied {
            color: var(--accent-hover);
            border-color: var(--accent-hover);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>GitHub Dev Card Generator</h1>
        <p class="subheading">Enter any public GitHub username</p>

        <div class="input-group">
            <input type="text" id="username" placeholder="e.g. torvalds" spellcheck="false">
            <button class="generate-btn" onclick="generateCard()">Generate Card</button>
        </div>

        <div id="error-msg"></div>

        <div id="loading-skeleton" class="skeleton pulsing">
            <div class="skeleton-header">
                <div class="skeleton-avatar"></div>
                <div style="flex: 1;">
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line short"></div>
                </div>
            </div>
            <div class="skeleton-line long"></div>
            <div class="skeleton-line long"></div>
            <div class="skeleton-line short"></div>
            <div style="margin-top: 30px;">
                <div class="skeleton-line long"></div>
                <div class="skeleton-line short"></div>
            </div>
        </div>

        <div id="result-container">
            <div id="card-render"></div>
            <button id="share-btn" class="share-btn" onclick="copyUrl()">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"></path><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"></path></svg>
                Copy Card URL
            </button>
        </div>
    </div>

    <script>
        // Handle environment variable substitution or fallback to localhost
        let apiBaseUrl = '${BACKEND_URL}';
        if (apiBaseUrl.startsWith('$') || apiBaseUrl === '') {
            apiBaseUrl = 'http://localhost:8080';
        }

        let currentCardUrl = '';

        async function generateCard() {
            const usernameInput = document.getElementById('username');
            const username = usernameInput.value.trim();
            const errorMsg = document.getElementById('error-msg');
            const skeleton = document.getElementById('loading-skeleton');
            const resultContainer = document.getElementById('result-container');
            const cardRender = document.getElementById('card-render');

            if (!username) return;

            // Reset UI
            errorMsg.style.display = 'none';
            resultContainer.style.display = 'none';
            skeleton.style.display = 'block';

            try {
                const response = await fetch(`${apiBaseUrl}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to generate card');
                }

                // Success
                currentCardUrl = `${apiBaseUrl}${data.url}`;
                cardRender.innerHTML = data.html;
                
                skeleton.style.display = 'none';
                resultContainer.style.display = 'flex';
                
            } catch (err) {
                skeleton.style.display = 'none';
                errorMsg.innerText = `Error: ${err.message}`;
                errorMsg.style.display = 'block';
            }
        }

        function copyUrl() {
            if (!currentCardUrl) return;
            
            navigator.clipboard.writeText(currentCardUrl).then(() => {
                const btn = document.getElementById('share-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = 'Copied!';
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Allow pressing Enter in input
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateCard();
        });
    </script>
</body>
</html>
